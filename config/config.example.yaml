# SMTP 邮件配置
# 将此文件复制为 config.yaml 并填入实际配置
# 或在 GitHub Actions 中通过 Secrets 配置

smtp:
  server: "smtp.qq.com"
  port: 465
  use_ssl: true

email:
  username: "your_email@qq.com"    # 发件邮箱
  password: "your_auth_code"       # QQ邮箱授权码（非登录密码）
  to: "385096659@qq.com"           # 收件邮箱

logging:
  level: "INFO"
