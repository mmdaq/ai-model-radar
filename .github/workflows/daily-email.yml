name: "🚀 AI 模型雷达日报 - 每日推送"

on:
  schedule:
    # 每天早上 9:00 和晚上 21:00 执行（北京时间 = UTC+8）
    - cron: "0 1 * * *"   # UTC 01:00 = 北京时间 09:00
    - cron: "0 13 * * *"  # UTC 13:00 = 北京时间 21:00
  workflow_dispatch:        # 支持手动触发
    inputs:
      send_email:
        description: "是否发送邮件"
        type: boolean
        default: true
        required: false

env:
  MAIL_SMTP_SERVER: ${{ secrets.MAIL_SMTP_SERVER || 'smtp.qq.com' }}
  MAIL_SMTP_PORT: ${{ secrets.MAIL_SMTP_PORT || '465' }}
  MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
  MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
  MAIL_TO: ${{ secrets.MAIL_TO }}
  LOG_LEVEL: INFO

jobs:
  fetch-and-send:
    name: "抓取数据 → 发送邮件"
    runs-on: ubuntu-latest
    
    steps:
      - name: "📥 Checkout 仓库"
        uses: actions/checkout@v4

      - name: "🐍 设置 Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: "📦 安装依赖"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "无额外依赖，全部使用标准库"

      - name: "📡 抓取 AIbase 模型发布数据"
        id: fetch
        run: |
          echo "开始抓取数据..."
          python main.py 2>&1 | tee output/run.log
          
          # 检查运行结果
          if grep -q "任务完成" output/run.log; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: "📤 上传输出文件作为 Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: model-radar-output
          path: output/
          retention-days: 7

      - name: "✅ 运行结果"
        run: |
          if [[ "${{ steps.fetch.outputs.status }}" == "success" ]]; then
            echo "🎉 任务完成！邮件已发送至 ${{ secrets.MAIL_TO }}"
          else
            echo "⚠️ 任务完成但有异常，请检查日志"
          fi
